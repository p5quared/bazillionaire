<!DOCTYPE html>
<html>
<head>
    <title>Bazillionaire</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    {#moneyBg /}
    <div class="page">
        <header class="masthead">
            <hr class="masthead-rule-top">
            <div class="masthead-title">Bazillionaire</div>
            <div class="masthead-meta">
                <span class="edition">Vol. I, No. 1</span>
                <span class="date" id="masthead-date"></span>
                <span class="edition">Final Edition</span>
            </div>
            <hr class="masthead-rule-bottom">
        </header>
        <div class="page-inner">
            <div class="nav">
                <a href="/" class="active">Home</a>
                <a href="/lobby">Lobbies</a>
                <a href="/users">Players</a>
            </div>
            <h1>welcome, {username}</h1>
            <p class="lead">Your trading desk awaits. Join a lobby to begin.</p>
        </div>
        <div class="page-footer">&copy; Bazillionaire</div>
    </div>
    <script>
    document.getElementById('masthead-date').textContent =
        new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
