<!DOCTYPE html>
<html>
<head>
    <title>Game - Bazillionaire</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(246, 226, 191, 0.45), transparent 32%),
                linear-gradient(180deg, #f3f0eb 0%, #ece8e0 100%);
            color: #111111;
            font-family: "IBM Plex Mono", "SFMono-Regular", "SF Mono", Monaco, Consolas, monospace;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #game-data {
            display: none;
        }

        /* ---- player bar ---- */
        #player-bar {
            display: flex;
            gap: 4px;
            padding: 12px;
        }

        .player-box {
            max-width: 180px;
            flex: 1;
            background: #ffffff;
            border: 3px solid #111111;
            padding: 8px;
            box-sizing: border-box;
        }

        .player-box--local {
            border-color: #b97814;
            background: #fff8e6;
        }

        .player-box--frozen {
            border-color: #d62828;
            background: #ffeeee;
        }

        .player-box__name {
            font-size: 12px;
            color: #111;
        }

        .player-box__cash {
            font-size: 16px;
            color: #111;
            margin-top: 2px;
        }

        .player-box__holdings {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }

        .player-box__inventory {
            font-size: 9px;
            color: #b97814;
            margin-top: 2px;
        }

        .player-box--drop-target {
            outline: 3px dashed #b97814;
            outline-offset: -3px;
            background: #fff8e6;
        }

        /* ---- powerup tray ---- */
        #powerup-tray {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px 8px;
            min-height: 0;
            flex-wrap: wrap;
        }

        #powerup-tray:empty {
            display: none;
        }

        #powerup-tray__label {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 2px;
        }

        #powerup-desc {
            font-size: 10px;
            color: #777;
            padding: 0 12px 4px;
            min-height: 14px;
        }

        #powerup-desc:empty {
            display: none;
        }

        .powerup-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border: 2px solid #b97814;
            background: #fff8e6;
            color: #111;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .powerup-pill:hover, .powerup-pill:focus {
            background: #f5e6b8;
            outline: none;
        }

        .powerup-pill--targeted {
            border-color: #d62828;
            background: #ffeeee;
        }

        .powerup-pill--targeted:hover, .powerup-pill--targeted:focus {
            background: #fdd;
        }

        .powerup-pill--dragging {
            opacity: 0.5;
        }

        .powerup-pill__badge {
            font-size: 9px;
            font-weight: bold;
            background: #b97814;
            color: #fff;
            padding: 0 4px;
            border-radius: 2px;
        }

        .powerup-pill--targeted .powerup-pill__badge {
            background: #d62828;
        }

        /* ---- target picker ---- */
        .target-picker {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border: 3px solid #111;
            padding: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .target-picker__title {
            font-size: 12px;
            font-weight: bold;
        }

        .target-picker__btn {
            padding: 6px 12px;
            border: 2px solid #111;
            background: #fff;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .target-picker__btn:hover {
            background: #f5f5ff;
        }

        .target-picker__btn--cancel {
            border-color: #999;
            color: #999;
        }

        /* ---- ticker cards ---- */
        #ticker-cards {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 0 12px 12px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .ticker-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            min-height: 120px;
            max-height: 180px;
            background: #ffffff;
            border: 3px solid #111111;
            padding: 12px;
            box-sizing: border-box;
        }

        .ticker-card:hover {
            background: #f5f5ff;
        }

        .ticker-card__symbol {
            font-size: 13px;
            color: #111;
        }

        .ticker-card__price {
            font-size: 40px;
            font-family: monospace;
            color: #111;
            margin-top: 4px;
        }

        .price--up {
            color: #0a8f3f;
        }

        .price--down {
            color: #d62828;
        }

        .ticker-card__sparkline {
            flex: 1;
            height: 100%;
            min-height: 20px;
        }

        .ticker-card__hint {
            font-size: 10px;
            color: #999;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="game-data" data-game-id="{gameId}" data-player-id="{playerId}"></div>
    <div id="player-bar"></div>
    <div id="powerup-tray"></div>
    <div id="powerup-desc"></div>
    <div id="ticker-cards"></div>
    <script src="/js/chart.js"></script>
    <script src="/js/draw.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
