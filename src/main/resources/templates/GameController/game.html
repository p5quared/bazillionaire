<!DOCTYPE html>
<html>
<head>
    <title>Game - Bazillionaire</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(246, 226, 191, 0.45), transparent 32%),
                linear-gradient(180deg, #f3f0eb 0%, #ece8e0 100%);
            color: #111111;
            font-family: "IBM Plex Mono", "SFMono-Regular", "SF Mono", Monaco, Consolas, monospace;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #game-data {
            display: none;
        }

        /* ---- player bar ---- */
        #player-bar {
            display: flex;
            gap: 4px;
            padding: 12px;
        }

        .player-box {
            max-width: 180px;
            flex: 1;
            background: #ffffff;
            border: 3px solid #111111;
            padding: 8px;
            box-sizing: border-box;
        }

        .player-box--local {
            border-color: #b97814;
            background: #fff8e6;
        }

        .player-box--frozen {
            border-color: #d62828;
            background: #ffeeee;
        }

        .player-box__name {
            font-size: 12px;
            color: #111;
        }

        .player-box__cash {
            font-size: 16px;
            color: #111;
            margin-top: 2px;
        }

        .player-box__holdings {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }

        .player-box__inventory {
            font-size: 9px;
            color: #b97814;
            margin-top: 2px;
        }

        /* ---- ticker cards ---- */
        #ticker-cards {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 0 12px 12px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .ticker-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            min-height: 120px;
            max-height: 180px;
            background: #ffffff;
            border: 3px solid #111111;
            padding: 12px;
            box-sizing: border-box;
        }

        .ticker-card:hover {
            background: #f5f5ff;
        }

        .ticker-card__symbol {
            font-size: 13px;
            color: #111;
        }

        .ticker-card__price {
            font-size: 40px;
            font-family: monospace;
            color: #111;
            margin-top: 4px;
        }

        .price--up {
            color: #0a8f3f;
        }

        .price--down {
            color: #d62828;
        }

        .ticker-card__sparkline {
            flex: 1;
            height: 100%;
            min-height: 20px;
        }

        .ticker-card__hint {
            font-size: 10px;
            color: #999;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="game-data" data-game-id="{gameId}" data-player-id="{playerId}"></div>
    <div id="player-bar"></div>
    <div id="ticker-cards"></div>
    <script src="/js/chart.js"></script>
    <script src="/js/draw.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
