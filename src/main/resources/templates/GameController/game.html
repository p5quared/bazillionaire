<!DOCTYPE html>
<html>
<head>
    <title>Game - Bazillionaire</title>
    <style>
        :root {
            --ink: #111111;
            --paper: rgba(255, 252, 246, 0.9);
            --paper-strong: rgba(255, 255, 255, 0.95);
            --line: rgba(17, 17, 17, 0.92);
            --muted: #575757;
            --good: #0a8f3f;
            --warn: #b97814;
            --bad: #d62828;
            --info: #1f5f8b;
            --shadow: 0 14px 32px rgba(17, 17, 17, 0.14);
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(246, 226, 191, 0.45), transparent 32%),
                linear-gradient(180deg, #f3f0eb 0%, #ece8e0 100%);
            color: var(--ink);
            font-family: "IBM Plex Mono", "SFMono-Regular", "SF Mono", Monaco, Consolas, monospace;
        }

        body {
            position: relative;
        }

        #game-data {
            display: none;
        }

        #game-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            padding: 16px;
            pointer-events: none;
            z-index: 10;
        }

        .overlay-column {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
            min-width: 220px;
            max-width: min(360px, 44vw);
        }

        .overlay-column.right {
            align-items: flex-end;
        }

        .overlay-panel {
            border: 2px solid var(--line);
            border-radius: 14px;
            background: var(--paper);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }

        #game-status-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border: 2px solid var(--line);
            border-radius: 999px;
            background: var(--paper-strong);
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
        }

        .status-chip.good { color: var(--good); }
        .status-chip.warn { color: var(--warn); }
        .status-chip.bad { color: var(--bad); }
        .status-chip.info { color: var(--info); }

        #game-controls {
            padding: 14px 16px;
        }

        #game-controls h2 {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        #game-controls p {
            margin: 0;
            font-size: 12px;
            line-height: 1.55;
            color: var(--muted);
        }

        .keycap {
            display: inline-block;
            min-width: 18px;
            padding: 2px 6px;
            border: 2px solid var(--line);
            border-radius: 6px;
            background: var(--paper-strong);
            color: var(--ink);
            text-align: center;
        }

        #game-toast-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(320px, 42vw);
        }

        .toast {
            padding: 12px 14px;
            border-left: 7px solid var(--line);
            background: var(--paper-strong);
            animation: toast-enter 180ms ease-out;
        }

        .toast.good { border-left-color: var(--good); }
        .toast.warn { border-left-color: var(--warn); }
        .toast.bad { border-left-color: var(--bad); }
        .toast.info { border-left-color: var(--info); }

        .toast-title {
            margin: 0 0 4px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .toast-copy {
            margin: 0;
            font-size: 13px;
            line-height: 1.45;
        }

        @keyframes toast-enter {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 760px) {
            #game-overlay {
                padding: 12px;
            }

            .overlay-column {
                min-width: 0;
                max-width: calc(50vw - 18px);
            }

            #game-toast-stack {
                width: min(280px, 50vw);
            }
        }
    </style>
</head>
<body>
    <div id="game-data" data-game-id="{gameId}" data-player-id="{playerId}"></div>
    <div id="game-overlay">
        <div class="overlay-column">
            <div id="game-status-chips" class="overlay-panel" aria-live="polite"></div>
            <div id="game-controls" class="overlay-panel">
                <h2>Trading Controls</h2>
                <p><span class="keycap">B</span> buy the hovered ticker</p>
                <p><span class="keycap">S</span> sell the hovered ticker</p>
                <p>Or click the on-card buy and sell buttons.</p>
            </div>
        </div>
        <div class="overlay-column right">
            <div id="game-toast-stack" aria-live="polite" aria-atomic="false"></div>
        </div>
    </div>
    <script src="https://unpkg.com/kaplay@3001.0.19/dist/kaplay.js"></script>
    <script src="/js/chart.js"></script>
    <script src="/js/draw.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
