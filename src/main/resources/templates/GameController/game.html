<!DOCTYPE html>
<html>
<head>
    <title>Game - Bazillionaire</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/css/game.css">
</head>
<body>
    <div id="notifications"></div>
    <div id="game-data" data-game-id="{gameId}" data-player-id="{playerId}"></div>
    <div id="game-timer"></div>
    <div id="player-bar"></div>
    <div id="ticker-cards"></div>
    <footer id="powerup-footer">
        <div id="powerup-footer__label">
            Powerups &amp; Consumables
            <span id="powerup-footer__count"></span>
        </div>
        <div id="powerup-desc"></div>
        <div id="powerup-tray"></div>
    </footer>
    <script src="/js/chart.js"></script>
    <script src="/js/draw.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
